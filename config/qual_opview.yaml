qual:
  # === 資料來源：OpView MCP via LiteLLM Proxy ===
  data_source:
    opview_mcp:
      litellm_url: "https://llmgw.elandai.cloud"
      litellm_api_key: "env:LITELLM_MCP_API_KEY"   # MCP key (wanchenlin-mcp)
      mcp_alias: "opview_tds"
      timeout: 30
      max_parallel: 5                                # 共用 quota: max_parallel=5
    searches:
      - categories: ["news"]
        keyword: "AI & 人工智慧"
        top_k: 20
        month_range: { start: "202601", end: "202603" }
        sort_by: "time"
      - categories: ["facebook", "dcard"]
        keyword: "生成式AI"
        top_k: 20
        month_range: { start: "202601", end: "202603" }
        sort_by: "time"

  # === Benchmark 任務設定 ===
  task_types:
    - "summarization"
    - "sentiment"
    - "classification"
    - "qa"
  items_per_task: 5

  # === 待測模型（使用 LLM key） ===
  models_under_test:
    - name: "gpt-oss-20b"
      base_url: "https://llmgw.elandai.cloud/v1"
      api_key: "env:LITELLM_API_KEY"               # LLM key (wanchenlin-llm)
      model: "gpt-oss-20b"

  # === Judge 設定（使用 LLM key） ===
  judge:
    model:
      name: "judge"
      base_url: "https://llmgw.elandai.cloud/v1"
      api_key: "env:LITELLM_API_KEY"               # LLM key (wanchenlin-llm)
      model: "gpt-oss-20b"
    max_concurrent: 5                               # 共用 quota: rpm=30, tpm=200K

  # === 輸出設定 ===
  output_dir: "results/qual"
  db_path: "llmbench_qual.db"
